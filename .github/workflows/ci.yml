name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: uniauth-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Check package
        run: npm run check

  dependabot-check:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: uniauth-dependabot
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Check package
        run: npm run check
